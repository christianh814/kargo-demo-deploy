apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    chx-version: v1.0
  labels:
    app: kargo-demo-app
  name: kargo-demo-ing
spec:
  ingressClassName: nginx
  rules:
  - host: prod1.7f000001.nip.io
    http:
      paths:
      - backend:
          service:
            name: kargo-demo-app
            port:
              number: 8080
        path: /
        pathType: Prefix
