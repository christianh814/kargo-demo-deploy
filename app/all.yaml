      annotations:
        chx-version: v1.0
      labels:
        app: kargo-demo-app
    spec:
      containers:
      - image: quay.io/christianh814/kargo-demo-app:v1.2.5
        name: kargo-demo-app
        volumeMounts:
        - mountPath: /app/config
          name: config-file
      volumes:
      - configMap:
          name: kargo-demo-app-config-tt6bb6629f
        name: config-file
