apiVersion: v1
data:
  greet.json: '{"message":"Kargo is an awesome tool!"}'
kind: ConfigMap
metadata:
  name: kargo-demo-app-config-tt6bb6629f
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    chx-version: v1.0
  labels:
    app: kargo-demo-app
  name: kargo-demo-app
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: kargo-demo-app
---
apiVersion: apps/v1
